name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      # Trusted Publishing (OIDC) — no token. The Trusted Publisher is configured
      # on npmjs.com for the `fancy-cli` package; the bootstrap NPM_TOKEN secret
      # has been removed. OIDC needs npm 11.5+; the runner ships npm 10, so fetch
      # a fresh npm via npx for the publish.
      - name: Publish
        run: npx -y npm@latest publish --provenance --access public
